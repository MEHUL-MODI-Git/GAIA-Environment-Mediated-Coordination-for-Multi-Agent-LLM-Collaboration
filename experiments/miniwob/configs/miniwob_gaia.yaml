# MiniWoB++ experiment configuration

method: miniwob_gaia

# Agent LLM configurations
web_navigator:
  provider: openai
  model: gpt-4o
  temperature: 0.3
  max_tokens: 500

dom_analyzer:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 800

web_planner:
  provider: openai
  model: gpt-4o
  temperature: 0.2
  max_tokens: 800

web_critic:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.3
  max_tokens: 400

# Episode policy
policy:
  max_steps: 15            # Max browser interaction steps per task
  max_iterations: 10       # Max episode loop iterations
  verification_strictness: success_flag
  branch_trigger_on_failure: false  # Phase 2
  branch_max_parallel: 3

# Budget per task
budget:
  max_cost_usd: 0.50
  max_llm_calls: 50

# Data paths (relative to project root)
data:
  tasks_path: data/miniwob/tasks.json

# Output
output:
  results_dir: experiments/miniwob/results
  log_dir: experiments/miniwob/results/logs
